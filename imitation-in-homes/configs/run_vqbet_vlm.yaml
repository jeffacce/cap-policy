defaults:
  - env_vars: env_vars
  - model: resnet50
  - loss_fn: vqbet_loss
  - _self_

image_save_dir: ${env_vars.project_root}/robot_images
image_buffer_size: 3
device: cpu
use_ui: false
use_vlm: true

task: door_opening
model_weight_pth: checkpoints/general-pick-up-goal-3-all-full-rvq-resnet50.pt
vqvae_load_dir: null
vqvae_n_embed: 16
temperature: 0.000001
sequentially_select: true
obs_window_size: ${image_buffer_size}

goal_dim: 3
gpt_input_dim: 512

run_offline: false
use_depth: false
stream_depth: true
use_pose: true

robot_params:
  h: 0.7
  max_h: 0.06
  max_base: 0.08
  abs_gripper: True
  rot_unit: axis

network:
  remote: 100.106.134.29
  camera_port: 32922
  action_port: 8081
  flag_port: 2828
  pose_port: 32932

wandb:
  entity: ${env_vars.wandb.entity}
  project: imitation-in-homes
  id: null
  save_code: true
