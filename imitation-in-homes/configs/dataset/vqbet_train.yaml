train:
  _target_: dataloaders.extended_action_dataset.ExtendedActionDataset
  config:
    _target_: dataloaders.utils.DataLoaderConfig
    dataset_root: ${env_vars.data_root.train}
    trajectory_roots:
      _target_: dataloaders.utils.load_trajectory_roots
      trajectory_root_path: ${dataset.train.config.dataset_root}/${demos_file}.txt
      original_root: ${env_vars.data_original_root.train}
      new_root: ${dataset.train.config.dataset_root}
    include_tasks: 
      - ${include_task}
    exclude_homes: []
    exclude_envs: []
    sequence_length: ${obs_window_size}
    control_timeskip: ${control_timeskip}
    safe_action_threshold: 0.05
    relative_gripper: False
    use_depth: ${use_depth}
    fps_subsample: 1
    goal_pose_dim: ${goal_dim}
    filter_static_frames: False
    static_filter_position_threshold: 0.003
    static_filter_rotation_threshold: 0.1
    static_filter_gripper_threshold: 0.05
  max_videoreaders_in_memory: 64
  shuffle_mode: RANDOM_ORDER
  device: cpu
  num_extra_actions: 0
  prefetch_to_ram: False


test:
  _target_: dataloaders.extended_action_dataset.ExtendedActionDataset
  config:
    _target_: dataloaders.utils.DataLoaderConfig
    dataset_root: ${env_vars.data_root.val}
    trajectory_roots:
      _target_: dataloaders.utils.load_trajectory_roots
      trajectory_root_path: ${dataset.test.config.dataset_root}/${demos_file}.txt
      original_root: ${env_vars.data_original_root.val}
      new_root: ${dataset.test.config.dataset_root}
    include_tasks: 
      - ${include_task}
    exclude_homes: []
    exclude_envs: []
    sequence_length: ${obs_window_size}
    control_timeskip: ${control_timeskip}
    safe_action_threshold: 0.05
    relative_gripper: False
    use_depth: ${use_depth}
    fps_subsample: 1
    goal_pose_dim: ${dataset.train.config.goal_pose_dim}
    filter_static_frames: False
    static_filter_position_threshold: 0.003
    static_filter_rotation_threshold: 0.1
    static_filter_gripper_threshold: 0.05
  max_videoreaders_in_memory: 64
  shuffle_mode: RANDOM_ORDER
  device: cpu
  num_extra_actions: 0
  prefetch_to_ram: ${dataset.train.prefetch_to_ram}
